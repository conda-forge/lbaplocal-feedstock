schema_version: 1

context:
  name: lbaplocal
  version: "0.9.9"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/48/f3/b0ce253c5b31f740ca9ba55ae7c4096aa82322eca0d9cd7a158bc1508fc9/lbaplocal-${{ version }}.tar.gz
  sha256: 79899d99f74844eb85a44adfd1caa175927f3f093060e78a5b5cf4d8e2541786

build:
  number: 1 # added prmon
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - lb-ap = LbAPLocal.cli.main:app
      - lb-ap-legacy = LbAPLocal.cli.legacy:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - lbapcommon >=0.15.11
    - dirac-cwl >=1.1.3
    - textual
    - textual-plotext
    - lbdiracwrappers
    - lbenv
    - lbprodrun >=1.12.2,<2.dev0
    - apd >=0.6.0
    - click
    - consolemd
    - mplhep
    - requests
    - setuptools
    - nodejs
    - quickjs
    - prmon

tests:
- python:
    python_version: ["${{ python_min }}.*", "*"]
    imports:
    - LbAPLocal
    pip_check: true

about:
  summary: Tool to locally run tests for AnalysisProductions
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://gitlab.cern.ch/lhcb-dpa/analysis-productions/lbaplocal
  repository: https://gitlab.cern.ch/lhcb-dpa/analysis-productions/lbaplocal

extra:
  recipe-maintainers:
    - ryuwd
    - AidanWiederhold
    - chrisburr
